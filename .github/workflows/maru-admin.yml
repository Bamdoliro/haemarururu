name: maru-admin

on:
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'configs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Cache turbo build
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-admin-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-admin-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm turbo run lint --filter=./apps/admin --continue --cache-dir=.turbo

      - name: Run Type Check
        run: pnpm turbo run check-types --filter=./apps/admin --continue --cache-dir=.turbo

      - name: Run Build (admin App)
        run: pnpm turbo run build --filter=./apps/admin --continue --cache-dir=.turbo
